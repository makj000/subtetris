<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Minusfall Icon Generator</title>
  <style>
    body { background: #222; display: flex; flex-direction: column; align-items: center;
           justify-content: center; min-height: 100vh; font-family: monospace; color: #eee; gap: 20px; }
    canvas { border-radius: 22%; box-shadow: 0 8px 40px rgba(0,0,0,0.7); }
    button { background: #c87941; border: none; color: #fff; font-size: 16px; font-family: monospace;
             padding: 12px 32px; border-radius: 8px; cursor: pointer; letter-spacing: 2px; }
    button:hover { background: #e08a50; }
    p { color: #888; font-size: 12px; }
  </style>
</head>
<body>
<canvas id="c" width="1024" height="1024"></canvas>
<button onclick="download()">DOWNLOAD icon-1024.png</button>
<p>Then run: ./generate-icons.sh icon-1024.png</p>

<script>
const c = document.getElementById('c');
const ctx = c.getContext('2d');
const S = 1024;

// Palette matching the game exactly
const palette = [
  'hsl(30, 85%, 65%)',  // 1: amber
  'hsl(22, 90%, 44%)',  // 2: burnt orange
  'hsl(14, 88%, 27%)',  // 3: dark reddish
  'hsl(6,  80%, 15%)',  // 4: near-black mahogany
];

function drawBlock(x, y, size, num) {
  const col = palette[num - 1];
  const r = size * 0.08;
  const bw = size * 0.13;

  // Drop shadow
  ctx.save();
  ctx.shadowColor = 'rgba(0,0,0,0.6)';
  ctx.shadowBlur = size * 0.18;
  ctx.shadowOffsetY = size * 0.07;
  ctx.beginPath();
  ctx.roundRect(x, y, size, size, r);
  ctx.fillStyle = col;
  ctx.fill();
  ctx.restore();

  // Clip to block shape for bevels
  ctx.save();
  ctx.beginPath();
  ctx.roundRect(x, y, size, size, r);
  ctx.clip();

  // Top-left bevel (lighter)
  ctx.fillStyle = 'rgba(255,255,255,0.25)';
  ctx.beginPath();
  ctx.moveTo(x, y + size);
  ctx.lineTo(x, y);
  ctx.lineTo(x + size, y);
  ctx.lineTo(x + size - bw, y + bw);
  ctx.lineTo(x + bw, y + bw);
  ctx.lineTo(x + bw, y + size - bw);
  ctx.closePath();
  ctx.fill();

  // Bottom-right bevel (darker)
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.beginPath();
  ctx.moveTo(x + size, y);
  ctx.lineTo(x + size, y + size);
  ctx.lineTo(x, y + size);
  ctx.lineTo(x + bw, y + size - bw);
  ctx.lineTo(x + size - bw, y + size - bw);
  ctx.lineTo(x + size - bw, y + bw);
  ctx.closePath();
  ctx.fill();

  ctx.restore();

  // Number
  ctx.save();
  ctx.font = `bold ${size * 0.54}px "Courier New", monospace`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillStyle = 'rgba(255,255,255,0.93)';
  ctx.shadowColor = 'rgba(0,0,0,0.45)';
  ctx.shadowBlur = size * 0.09;
  ctx.fillText(num, x + size / 2, y + size / 2 + size * 0.03);
  ctx.restore();
}

function draw() {
  // Navy background
  const bg = ctx.createLinearGradient(0, 0, 0, S);
  bg.addColorStop(0, '#0d1f3c');
  bg.addColorStop(1, '#060e1c');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, S, S);

  // 2×2 block grid, centered
  const B = 380;   // block size
  const gap = 16;  // gap between blocks
  const total = 2 * B + gap;
  const ox = (S - total) / 2;
  const oy = (S - total) / 2;

  // [col, row, num]
  const blocks = [
    [0, 0, 1],
    [1, 0, 2],
    [0, 1, 3],
    [1, 1, 4],
  ];

  for (const [col, row, num] of blocks) {
    drawBlock(ox + col * (B + gap), oy + row * (B + gap), B, num);
  }
}

draw();

function download() {
  const a = document.createElement('a');
  a.download = 'icon-1024.png';
  a.href = c.toDataURL('image/png');
  a.click();
}
</script>
</body>
</html>
