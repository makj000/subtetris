<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Press+Start+2P&family=Share+Tech+Mono&family=VT323&family=Rajdhani:wght@700&family=Bebas+Neue&family=Nova+Mono&family=Audiowide&display=swap" rel="stylesheet">
<style>
  body { background: #071020; margin: 0; padding: 20px 28px; font-family: sans-serif; }
  h4 { color: #ffaa44; font-size: 11px; letter-spacing: 2px; margin: 0 0 16px; font-weight: normal; }
  .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
  .card { background: #0d1f3c; border: 1px solid #1e3a5f; border-radius: 6px; padding: 14px 16px; }
  .card.current { border-color: #2a5498; }
  .fname { font-size: 9px; letter-spacing: 1px; color: #556; margin-bottom: 10px; text-transform: uppercase; }
  .fname.cur { color: #4a7; }
  .score-bright { color: #fff; font-variant-numeric: tabular-nums; font-weight: bold;
                  text-shadow: 0 0 12px rgba(100,160,255,0.5); }
  .score-faded  { color: #253545; font-variant-numeric: tabular-nums; font-weight: bold; margin-top: 4px; }
</style>
</head>
<body>
<h4>SCORE FONT OPTIONS &nbsp;·&nbsp; top = current score &nbsp;·&nbsp; bottom = record (faded)</h4>
<div class="grid">

  <div class="card current">
    <div class="fname cur">Courier New · current</div>
    <div class="score-bright" style="font-family:'Courier New',monospace;font-size:28px;">12850</div>
    <div class="score-faded"  style="font-family:'Courier New',monospace;font-size:28px;">98430</div>
  </div>

  <div class="card">
    <div class="fname">Orbitron</div>
    <div class="score-bright" style="font-family:'Orbitron';font-size:24px;">12850</div>
    <div class="score-faded"  style="font-family:'Orbitron';font-size:24px;">98430</div>
  </div>

  <div class="card">
    <div class="fname">Press Start 2P</div>
    <div class="score-bright" style="font-family:'Press Start 2P';font-size:16px;line-height:1.5">12850</div>
    <div class="score-faded"  style="font-family:'Press Start 2P';font-size:16px;line-height:1.5">98430</div>
  </div>

  <div class="card">
    <div class="fname">VT323</div>
    <div class="score-bright" style="font-family:'VT323';font-size:42px;line-height:1">12850</div>
    <div class="score-faded"  style="font-family:'VT323';font-size:42px;line-height:1">98430</div>
  </div>

  <div class="card">
    <div class="fname">Share Tech Mono</div>
    <div class="score-bright" style="font-family:'Share Tech Mono';font-size:28px;">12850</div>
    <div class="score-faded"  style="font-family:'Share Tech Mono';font-size:28px;">98430</div>
  </div>

  <div class="card">
    <div class="fname">Nova Mono</div>
    <div class="score-bright" style="font-family:'Nova Mono';font-size:26px;">12850</div>
    <div class="score-faded"  style="font-family:'Nova Mono';font-size:26px;">98430</div>
  </div>

  <div class="card">
    <div class="fname">Audiowide</div>
    <div class="score-bright" style="font-family:'Audiowide';font-size:22px;">12850</div>
    <div class="score-faded"  style="font-family:'Audiowide';font-size:22px;">98430</div>
  </div>

  <div class="card">
    <div class="fname">Bebas Neue</div>
    <div class="score-bright" style="font-family:'Bebas Neue';font-size:38px;line-height:1">12850</div>
    <div class="score-faded"  style="font-family:'Bebas Neue';font-size:38px;line-height:1">98430</div>
  </div>

  <div class="card">
    <div class="fname">Rajdhani</div>
    <div class="score-bright" style="font-family:'Rajdhani';font-size:32px;line-height:1.1">12850</div>
    <div class="score-faded"  style="font-family:'Rajdhani';font-size:32px;line-height:1.1">98430</div>
  </div>

</div>
</body>
</html>
